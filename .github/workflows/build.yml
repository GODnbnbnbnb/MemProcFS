name: Build and Release Windows DLL

on:
  push:
    tags:
      - 'v*' # 只有打 v 开头的标签才会自动发 Release
  workflow_dispatch: # 允许在网页端手动点击运行测试

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Build Solution
      run: |
        # 【修改提示 1】这里写你的 .sln 解决方案文件路径
        msbuild MemProcFS.sln /p:Configuration=Release /p:Platform=x64 /maxcpucount

    - name: Collect Artifacts
      run: |
        mkdir release_output
        # 【修改提示 2】这里写编译后生成的 dll 路径
        # 如果你编译的是 MemProcFS，通常在 vmm\x64\Release\vmm.dll
        copy "vmm\x64\Release\vmm.dll" release_output\
        
        # 如果你编译的是 LeechCore，可能是下面这样，把上面的 copy 删掉换成这个：
        # copy "leechcore\x64\Release\leechcore.dll" release_output\

    - name: Create Release and Upload Assets
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: release_output/*
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

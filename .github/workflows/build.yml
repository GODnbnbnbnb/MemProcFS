name: Build and Release Windows DLL

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Clone LeechCore (Dependency)
      # 直接用 git clone 拉取到上一级目录，完美绕过 Actions 的路径限制
      run: git clone https://github.com/ufrisk/LeechCore.git ..\LeechCore

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Build ONLY vmm.dll
      run: |
        msbuild vmm\vmm.vcxproj /p:Configuration=Release /p:Platform=x64 /maxcpucount

    - name: Collect Artifacts
      run: |
        mkdir release_output
        copy "vmm\x64\Release\vmm.dll" release_output\
        copy "vmm\x64\Release\vmm.pdb" release_output\ || echo "No PDB found, skipping"

    - name: Create Release and Upload Assets
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: release_output/*
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

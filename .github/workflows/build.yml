name: Build and Release Windows DLL

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Checkout LeechCore (Dependency)
      # MemProcFS 强依赖同级目录下的 LeechCore 才能编译通过
      uses: actions/checkout@v4
      with:
        repository: ufrisk/LeechCore
        path: ../LeechCore

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Build ONLY vmm.dll
      run: |
        # 直接指定编译 vmm.vcxproj，跳过 python/C# 绑定和其他示例项目
        msbuild vmm\vmm.vcxproj /p:Configuration=Release /p:Platform=x64 /maxcpucount

    - name: Collect Artifacts
      run: |
        mkdir release_output
        # 提取生成的 vmm.dll 和可能用到的 pdb 文件
        copy "vmm\x64\Release\vmm.dll" release_output\
        copy "vmm\x64\Release\vmm.pdb" release_output\ || echo "No PDB found, skipping"

    - name: Create Release and Upload Assets
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: release_output/*
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build and Release Windows DLL

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Clone LeechCore (Dependency)
      run: git clone https://github.com/ufrisk/LeechCore.git ..\LeechCore

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Build ONLY vmm.dll via Solution
      run: |
        msbuild MemProcFS.sln /t:vmm /p:Configuration=Release /p:Platform=x64 /maxcpucount

    - name: Collect Artifacts
      shell: cmd
      run: |
        mkdir release_output
        copy "files\vmm.dll" release_output\
        if exist "files\vmm.pdb" copy "files\vmm.pdb" release_output\

    - name: Create Release and Upload Assets
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: release_output/*
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
